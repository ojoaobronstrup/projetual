services:
  frontend:
    image: node:20-bullseye
    working_dir: /app
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "250"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:

